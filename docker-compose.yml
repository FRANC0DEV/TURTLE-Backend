services:
  turtle-backend:
    build:
      context: .
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get({hostname:'localhost',port:process.env.PORT||3000,path:'/health',timeout:5000},r=>process.exit(r.statusCode==200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
volumes:
  pg-data:
  pg-admin-data:
networks:
  backend_network:
    driver: "bridge"
  dba_network:
    driver: "bridge"
