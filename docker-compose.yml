services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - ${HOST_POSTGRES_PORT}:5432
    volumes:
      - pg-data:/var/lib/postgresql/18/docker
      - ./bd-init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    networks:
      - pg_network
  pgadmin:
    image: dpage/pgadmin4:9.14.0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - ${HOST_PGADMIN_PORT}:80
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    networks:
      - pg_network

volumes:
  pg-data:
networks:
  pg_network:
    driver: "bridge"
